openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Travel Blog API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Blog post operations
  - name: trips
    description: Trip operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all blog posts
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a blog post by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    patch:
      operationId: updatePost
      tags: [posts]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List all trips
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Add a trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripBody"
      responses:
        "201":
          description: Created trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a trip by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTripBody"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /map-pins:
    get:
      operationId: listMapPins
      tags: [posts]
      summary: Get all map pins (posts with lat/lng) for the world map
      responses:
        "200":
          description: List of map pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapPin"

  /stats:
    get:
      operationId: getStats
      tags: [trips]
      summary: Get travel stats summary
      responses:
        "200":
          description: Travel stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GalleryImage:
      type: object
      properties:
        url:
          type: string
        caption:
          type: string
      required:
        - url
        - caption

    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        excerpt:
          type: string
        coverImageUrl:
          type: ["string", "null"]
        gallery:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/GalleryImage"
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        location:
          type: ["string", "null"]
        tripId:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - slug
        - content
        - excerpt
        - coverImageUrl
        - gallery
        - latitude
        - longitude
        - location
        - tripId
        - publishedAt
        - createdAt
        - updatedAt

    CreatePostBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        excerpt:
          type: string
        coverImageUrl:
          type: ["string", "null"]
        gallery:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/GalleryImage"
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        location:
          type: ["string", "null"]
        tripId:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]
      required:
        - title
        - slug
        - content
        - excerpt

    UpdatePostBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        excerpt:
          type: string
        coverImageUrl:
          type: ["string", "null"]
        gallery:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/GalleryImage"
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        location:
          type: ["string", "null"]
        tripId:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]

    Trip:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        countryCode:
          type: string
        visitedCities:
          type: string
        reasonForVisit:
          type: string
        travelCompanions:
          type: string
        friendsFamilyMet:
          type: string
        visitedAt:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        transportationTo:
          type: ["string", "null"]
        transportationOnSite:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - countryCode
        - visitedCities
        - reasonForVisit
        - travelCompanions
        - friendsFamilyMet
        - visitedAt
        - latitude
        - longitude
        - transportationTo
        - transportationOnSite
        - createdAt
        - updatedAt

    CreateTripBody:
      type: object
      properties:
        name:
          type: string
        countryCode:
          type: string
        visitedCities:
          type: string
        reasonForVisit:
          type: string
        travelCompanions:
          type: string
        friendsFamilyMet:
          type: string
        visitedAt:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        transportationTo:
          type: ["string", "null"]
        transportationOnSite:
          type: ["string", "null"]
      required:
        - name
        - countryCode
        - visitedCities
        - reasonForVisit
        - travelCompanions
        - friendsFamilyMet
        - visitedAt
        - latitude
        - longitude

    UpdateTripBody:
      type: object
      properties:
        name:
          type: string
        countryCode:
          type: string
        visitedCities:
          type: string
        reasonForVisit:
          type: string
        travelCompanions:
          type: string
        friendsFamilyMet:
          type: string
        visitedAt:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        transportationTo:
          type: ["string", "null"]
        transportationOnSite:
          type: ["string", "null"]

    MapPin:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        coverImageUrl:
          type: ["string", "null"]
        latitude:
          type: number
        longitude:
          type: number
        location:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
      required:
        - id
        - title
        - slug
        - excerpt
        - coverImageUrl
        - latitude
        - longitude
        - location
        - publishedAt

    TravelStats:
      type: object
      properties:
        totalTrips:
          type: integer
        totalPosts:
          type: integer
        totalCities:
          type: integer
        continents:
          type: integer
      required:
        - totalTrips
        - totalPosts
        - totalCities
        - continents
